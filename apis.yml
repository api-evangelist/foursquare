aid: foursquare
name: Foursquare
description: >-
  Foursquare is a location intelligence platform that maintains a global graph of more than 100 million points of
  interest (POI) and provides developer APIs and SDKs for place search, geotagging, autocomplete, audience measurement,
  and visit detection across web and mobile.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
created: '2025-03-01'
modified: '2026-06-02'
tags:
  - Restaurant
  - Locations
  - Places
  - Geocoding
  - Recommendations
  - Reviews
  - Movement
url: https://raw.githubusercontent.com/api-evangelist/foursquare/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: foursquare:places-api
    name: Foursquare Places API
    description: >-
      The Foursquare Places API provides global POI data with endpoints for place search, nearby, autocomplete, place
      details, photos, tips, geotagging, and Placemaker submissions.
    humanURL: https://docs.foursquare.com/developer/reference/places-api-overview
    baseURL: https://places-api.foursquare.com
    tags:
      - Places
      - Search
      - Geocoding
      - Autocomplete
