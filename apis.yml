          https://raw.githubusercontent.com/api-evangelist/foursquare/refs/heads/main/vocabulary/foursquare-vocabulary.yml
      - type: Examples
        name: Place Example
        url: >-
          https://raw.githubusercontent.com/api-evangelist/foursquare/refs/heads/main/examples/foursquare-place-example.json
      - type: Examples
        name: Search Response Example
        url: >-
