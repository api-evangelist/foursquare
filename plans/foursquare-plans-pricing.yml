specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Foursquare
providerId: foursquare
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Locations
  - Places
  - Geospatial
  - Movement
  - Geocoding
description: Foursquare offers a portfolio of geospatial products with mixed pricing. Spatial Desktop
  uses tiered subscriptions with included agent-token allowances. The Places API is volume-based with
  per-CPM (per 1,000 calls) tiered pricing. Spatial Workbench is a flat developer subscription plus
  metered MotherDuck compute. Attribution, Audience, and Proximity are custom-quoted. Pricing updates
  effective June 1, 2026.
sources:
  - https://foursquare.com/products/pricing/
plans:
  - id: foursquare-spatial-desktop-basic
    name: Spatial Desktop — Basic
    type: freemium
    description: Free tier for Spatial Desktop through 2026; intended for evaluation.
    entries:
      - label: Agent tokens included
        name: agent_tokens
        type: quota
        metric: USD_value
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Storage
        name: storage
        type: quota
        metric: GB
        limit: 3
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Shared projects
        name: shared_projects
        type: quota
        metric: project
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Free through 2026
      - name: Spatial Desktop access
