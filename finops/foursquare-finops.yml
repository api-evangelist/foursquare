specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Foursquare
providerId: foursquare
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Locations
  - Geospatial
description: 'FOCUS-aligned FinOps for Foursquare: a mix of tiered SaaS subscriptions (Spatial
  Desktop / Workbench / Studio), volume-tiered CPM usage for Places API, and metered compute hours
  for Spatial Workbench.'
sources:
  - https://foursquare.com/products/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Foursquare Labs, Inc.
serviceCategory: Geospatial & Location Data
billingModel:
  pricingCategory: Tiered Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Foursquare
  ServiceCategory: Geospatial & Location Data
  ProviderName: Foursquare
  PublisherName: Foursquare Labs, Inc.
  InvoiceIssuerName: Foursquare Labs, Inc.
  BillingCurrency: USD
meters:
  - name: places_api_calls
    unit: request
    aggregation: sum
    dimensions:
      - endpoint_class
      - tier
      - account
  - name: agent_tokens
    unit: USD_value
    aggregation: sum
    dimensions:
      - product
      - account
  - name: workbench_compute_hours
    unit: hour
    aggregation: sum
    dimensions:
      - instance_class
  - name: storage
    unit: GB-month
    aggregation: max
    dimensions:
      - product
      - account
  - name: subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - product
      - tier
principles:
  - name: Visibility
    description: Use the Foursquare account dashboard to monitor monthly Places API call volume
      and current CPM tier; track agent-token consumption against monthly allowance.
  - name: Allocation
    description: Issue separate API keys per consuming application or environment so usage and
      cost can be allocated to the right team.
  - name: Optimization
    description: Cache Places API responses where allowed by terms; consolidate calls into higher
      volume tiers to drop into lower CPM rates; right-size Workbench compute (Pulse vs Standard
      vs Jumbo).
  - name: Accountability
    description: Set monthly call-volume budgets per API key; review CPM-tier movement and
      Workbench compute spend at month-end close.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
