specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Foursquare
providerId: foursquare
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Locations
  - Places
  - Geospatial
  - Rate Limiting
description: Foursquare's Places API enforces per-API-key rate limits documented per endpoint in the
  developer docs. Specific per-second/per-minute thresholds vary by endpoint and account tier and are
  not published on a single consolidated page; monthly call volume governs CPM pricing tier
  placement.
notes: A consolidated rate-limits page was not retrievable during reconciliation; per-endpoint limits
  should be checked in the live developer docs at docs.foursquare.com.
sources:
  - https://foursquare.com/products/pricing/
  - https://docs.foursquare.com/
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Places API per-key throttling
    scope: api-key
    metric: varies
    limit: see endpoint-level documentation
  - name: Places API monthly volume tier
    scope: api-key
    metric: requests_per_month
    limit: see Pro/Premium pricing tier
policies:
  - name: Volume-tier billing
    description: Monthly call volume rolls up to a pricing tier; charges apply per CPM (per 1,000
      calls) according to the tier hit.
  - name: Backoff on 429
    description: Implement exponential backoff with jitter on 429 responses; honor Retry-After
      when present.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
