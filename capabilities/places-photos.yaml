naftiko: 1.0.0-alpha2
info:
  label: Foursquare Places API — Photos
  description: 'Photos surface of the Foursquare Places API. 1 operation(s). Lead operation: Get Place
    Photos. Self-contained Naftiko capability covering one Foursquare business surface.'
  tags:
  - Foursquare
  - Places
  - Photos
  created: '2026-05-04'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    FOURSQUARE_SERVICE_TOKEN: FOURSQUARE_SERVICE_TOKEN
capability:
  consumes:
  - type: http
    namespace: places-photos
    baseUri: https://places-api.foursquare.com
    description: Foursquare Places API — Photos business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.FOURSQUARE_SERVICE_TOKEN}}'
    resources:
    - name: places-fsq-place-id-photos
      path: /places/{fsq_place_id}/photos
      operations:
      - name: getPlacePhotos
        method: GET
        description: Get Place Photos
        inputParameters:
        - name: X-Places-Api-Version
          in: header
          type: string
          required: true
          description: Dated Places API version header.
        - name: fsq_place_id
          in: path
          type: string
          required: true
          description: fsq_place_id
        - name: limit
          in: query
          type: integer
          required: false
          description: limit
        - name: sort
          in: query
          type: string
          required: false
          description: sort
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: places-photos-rest
    port: 8080
    description: REST adapter for Foursquare Places API — Photos. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/places-fsq-place-id-photos
      name: places-fsq-place-id-photos
      description: REST surface for Get Place Photos.
      operations:
      - method: GET
        name: getPlacePhotos
        description: Get Place Photos
        call: places-photos.getPlacePhotos
        with:
          X-Places-Api-Version: rest.X-Places-Api-Version
          fsq_place_id: rest.fsq_place_id
          limit: rest.limit
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: places-photos-mcp
    port: 9090
    transport: http
    description: MCP adapter for Foursquare Places API — Photos. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-place-photos
      description: Get Place Photos
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: places-photos.getPlacePhotos
      with:
        X-Places-Api-Version: tools.X-Places-Api-Version
        fsq_place_id: tools.fsq_place_id
        limit: tools.limit
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
