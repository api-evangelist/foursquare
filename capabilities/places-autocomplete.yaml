naftiko: 1.0.0-alpha2
info:
  label: Foursquare Places API — Autocomplete
  description: 'Autocomplete surface of the Foursquare Places API. 1 operation(s). Lead operation: Autocomplete
    Query Suggestions. Self-contained Naftiko capability covering one Foursquare business surface.'
  tags:
  - Foursquare
  - Places
  - Autocomplete
  created: '2026-05-04'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    FOURSQUARE_SERVICE_TOKEN: FOURSQUARE_SERVICE_TOKEN
capability:
  consumes:
  - type: http
    namespace: places-autocomplete
    baseUri: https://places-api.foursquare.com
    description: Foursquare Places API — Autocomplete business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.FOURSQUARE_SERVICE_TOKEN}}'
    resources:
    - name: autocomplete
      path: /autocomplete
      operations:
      - name: autocomplete
        method: GET
        description: Autocomplete Query Suggestions
        inputParameters:
        - name: X-Places-Api-Version
          in: header
          type: string
          required: true
          description: Dated Places API version header.
        - name: query
          in: query
          type: string
          required: true
          description: query
        - name: ll
          in: query
          type: string
          required: false
          description: ll
        - name: radius
          in: query
          type: integer
          required: false
          description: radius
        - name: types
          in: query
          type: string
          required: false
          description: Comma-separated set such as place,address,geo.
        - name: limit
          in: query
          type: integer
          required: false
          description: limit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: places-autocomplete-rest
    port: 8080
    description: REST adapter for Foursquare Places API — Autocomplete. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/autocomplete
      name: autocomplete
      description: REST surface for Autocomplete Query Suggestions.
      operations:
      - method: GET
        name: autocomplete
        description: Autocomplete Query Suggestions
        call: places-autocomplete.autocomplete
        with:
          X-Places-Api-Version: rest.X-Places-Api-Version
          query: rest.query
          ll: rest.ll
          radius: rest.radius
          types: rest.types
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: places-autocomplete-mcp
    port: 9090
    transport: http
    description: MCP adapter for Foursquare Places API — Autocomplete. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: autocomplete-query-suggestions
      description: Autocomplete Query Suggestions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: places-autocomplete.autocomplete
      with:
        X-Places-Api-Version: tools.X-Places-Api-Version
        query: tools.query
        ll: tools.ll
        radius: tools.radius
        types: tools.types
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
