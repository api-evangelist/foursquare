naftiko: 1.0.0-alpha2
info:
  label: Foursquare Places API — tips
  description: 'Foursquare Places API — tips. 1 operations. Lead operation: Place tips. Self-contained Naftiko capability
    covering one Foursquare business surface.'
  tags:
  - Foursquare
  - tips
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FOURSQUARE_API_KEY: FOURSQUARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: places-tips
    baseUri: https://places-api.foursquare.com
    description: Foursquare Places API — tips business capability. Self-contained, no shared references.
    resources:
    - name: places-fsq_id-tips
      path: /places/{fsq_id}/tips
      operations:
      - name: getplacetips
        method: GET
        description: Place tips
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fsq_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.FOURSQUARE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: places-tips-rest
    port: 8080
    description: REST adapter for Foursquare Places API — tips. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/places/{fsq-id}/tips
      name: places-fsq-id-tips
      description: REST surface for places-fsq_id-tips.
      operations:
      - method: GET
        name: getplacetips
        description: Place tips
        call: places-tips.getplacetips
        with:
          fsq_id: rest.fsq_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: places-tips-mcp
    port: 9090
    transport: http
    description: MCP adapter for Foursquare Places API — tips. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: place-tips
      description: Place tips
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: places-tips.getplacetips
      with:
        fsq_id: tools.fsq_id
      outputParameters:
      - type: object
        mapping: $.
