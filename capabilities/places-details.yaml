naftiko: 1.0.0-alpha2
info:
  label: Foursquare Places API — Details
  description: 'Details surface of the Foursquare Places API. 1 operation(s). Lead operation: Get Place
    Details. Self-contained Naftiko capability covering one Foursquare business surface.'
  tags:
  - Foursquare
  - Places
  - Details
  created: '2026-05-04'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    FOURSQUARE_SERVICE_TOKEN: FOURSQUARE_SERVICE_TOKEN
capability:
  consumes:
  - type: http
    namespace: places-details
    baseUri: https://places-api.foursquare.com
    description: Foursquare Places API — Details business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.FOURSQUARE_SERVICE_TOKEN}}'
    resources:
    - name: places-fsq-place-id
      path: /places/{fsq_place_id}
      operations:
      - name: getPlace
        method: GET
        description: Get Place Details
        inputParameters:
        - name: X-Places-Api-Version
          in: header
          type: string
          required: true
          description: Dated Places API version header.
        - name: fsq_place_id
          in: path
          type: string
          required: true
          description: fsq_place_id
        - name: fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to include.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: places-details-rest
    port: 8080
    description: REST adapter for Foursquare Places API — Details. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/places-fsq-place-id
      name: places-fsq-place-id
      description: REST surface for Get Place Details.
      operations:
      - method: GET
        name: getPlace
        description: Get Place Details
        call: places-details.getPlace
        with:
          X-Places-Api-Version: rest.X-Places-Api-Version
          fsq_place_id: rest.fsq_place_id
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: places-details-mcp
    port: 9090
    transport: http
    description: MCP adapter for Foursquare Places API — Details. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-place-details
      description: Get Place Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: places-details.getPlace
      with:
        X-Places-Api-Version: tools.X-Places-Api-Version
        fsq_place_id: tools.fsq_place_id
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
